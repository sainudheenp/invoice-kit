<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Document Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="nav">
<button id="tabSettingsBtn" onclick="switchTab('settings')">&#9881; SETTINGS</button>
<button id="tabInvoiceBtn" onclick="switchTab('invoice')">&#128196; INVOICE</button>
<button id="tabReceiptBtn" onclick="switchTab('receipt')">&#128203; RECEIPT</button>
</div>

<!-- LOADER -->
<div id="loader" class="loading">
<div class="spinner"></div>
<p style="color:#888;font-size:14px">Loading database...</p>
</div>

<!-- MAIN CONTENT (hidden until DB ready) -->
<div id="appContent" style="display:none">

<!-- ===== SETTINGS ===== -->
<div id="settingsPanel" class="tab-panel active">
<div class="card">
<div class="comp-bar">
<select id="companySelect" onchange="switchCompany(this.value)"></select>
<button class="btn btn-green btn-sm" onclick="newCompany()">+ New</button>
<button class="btn btn-red btn-sm" onclick="deleteCompany()">Del</button>
<button class="btn btn-blue btn-sm" onclick="exportData()">Export</button>
<button class="btn btn-orange btn-sm" onclick="document.getElementById('importFile').click()">Import</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<h2>Company Details</h2>
<div class="settings-grid">
<div class="form-group"><label>Company Name (EN)</label><input id="s_name"></div>
<div class="form-group"><label>Company Name (AR)</label><input id="s_nameAr" dir="rtl"></div>
<div class="form-group"><label>Subtitle (EN)</label><input id="s_sub"></div>
<div class="form-group"><label>Subtitle (AR)</label><input id="s_subAr" dir="rtl"></div>
</div>

<h3>Contact</h3>
<div class="settings-grid">
<div class="form-group"><label>Tel</label><input id="s_tel" type="tel"></div>
<div class="form-group"><label>Fax</label><input id="s_fax" type="tel"></div>
<div class="form-group"><label>Mobile</label><input id="s_mob" type="tel"></div>
<div class="form-group"><label>Email</label><input id="s_email" type="email"></div>
<div class="form-group"><label>C.R. Number</label><input id="s_cr"></div>
<div class="form-group"><label>P.O.Box</label><input id="s_pobox"></div>
<div class="form-group"><label>Location</label><input id="s_loc"></div>
<div class="form-group"><label>Website</label><input id="s_website" type="url"></div>
</div>

<h3>Branding</h3>
<div class="settings-grid">
<div class="form-group">
<label>Logo</label>
<div class="upload-row">
<div id="logoPrev" class="prev-box">No logo</div>
<div class="btn-group">
<button class="btn btn-sm btn-blue" onclick="document.getElementById('logoInput').click()">Upload</button>
<button class="btn btn-sm btn-outline" onclick="uploadSvgLogo()">SVG</button>
<button class="btn btn-sm btn-red" onclick="clearLogo()">X</button>
<input type="file" id="logoInput" accept="image/*" style="display:none">
</div></div>
</div>
<div class="form-group">
<label>Seal / Stamp</label>
<div class="upload-row">
<div id="sealPrev" class="prev-box">No seal</div>
<div class="btn-group">
<button class="btn btn-sm btn-blue" onclick="document.getElementById('sealInput').click()">Upload</button>
<button class="btn btn-sm btn-red" onclick="clearSeal()">X</button>
<input type="file" id="sealInput" accept="image/*" style="display:none" onchange="uploadFile('seal',this)">
</div></div>
</div>
<div class="form-group">
<label>Signature</label>
<div class="upload-row">
<div id="sigPrev" class="prev-box">No sig</div>
<div class="btn-group">
<button class="btn btn-sm btn-blue" onclick="document.getElementById('sigInput').click()">Upload</button>
<button class="btn btn-sm btn-red" onclick="clearSig()">X</button>
<input type="file" id="sigInput" accept="image/*" style="display:none" onchange="uploadFile('sig',this)">
</div></div>
</div>
<div class="form-group"><label>Primary Color</label><input id="s_pcolor" type="color" value="#1b4d3d" style="height:44px;padding:2px"></div>
<div class="form-group"><label>Accent Color</label><input id="s_acolor" type="color" value="#f5c842" style="height:44px;padding:2px"></div>
</div>

<h3>Currency</h3>
<div class="settings-grid">
<div class="form-group"><label>Preset</label>
<select id="s_currencyPreset">
<option value="OMR">OMR - Omani Rial</option>
<option value="USD">USD - US Dollar</option>
<option value="EUR">EUR - Euro</option>
<option value="GBP">GBP - Pound</option>
<option value="SAR">SAR - Saudi Riyal</option>
<option value="AED">AED - UAE Dirham</option>
<option value="KWD">KWD - Kuwaiti Dinar</option>
<option value="QAR">QAR - Qatari Riyal</option>
<option value="BHD">BHD - Bahraini Dinar</option>
<option value="EGP">EGP - Egyptian Pound</option>
<option value="CUSTOM">Custom</option>
</select></div>
<div class="form-group"><label>Code</label><input id="s_curCode"></div>
<div class="form-group"><label>Symbol</label><input id="s_curSym"></div>
<div class="form-group"><label>Name (singular)</label><input id="s_curName"></div>
<div class="form-group"><label>Name (plural)</label><input id="s_curNamePl"></div>
<div class="form-group"><label>Sub-unit (singular)</label><input id="s_curSub"></div>
<div class="form-group"><label>Sub-unit (plural)</label><input id="s_curSubPl"></div>
<div class="form-group"><label>Sub-units per unit</label><input id="s_curSubPer" type="number"></div>
</div>

<h3>Tax / VAT</h3>
<div class="settings-grid">
<div class="form-group"><label>VAT Reg No.</label><input id="s_vatReg"></div>
<div class="form-group"><label>Default VAT %</label><input id="s_vatPct" type="number" step="0.01"></div>
</div>

<h3>Bank Details</h3>
<div class="settings-grid">
<div class="form-group"><label>Bank Name</label><input id="s_bankName"></div>
<div class="form-group"><label>Account Name</label><input id="s_bankAccName"></div>
<div class="form-group"><label>Account No.</label><input id="s_bankAcc"></div>
<div class="form-group"><label>IBAN</label><input id="s_bankIban"></div>
<div class="form-group"><label>SWIFT</label><input id="s_bankSwift"></div>
<div class="form-group"><label>Branch</label><input id="s_bankBranch"></div>
</div>

<h3>Numbering</h3>
<div class="settings-grid">
<div class="form-group"><label>Invoice Prefix</label><input id="s_invPref"></div>
<div class="form-group"><label>Next Invoice #</label><input id="s_invNext" type="number" min="1"></div>
<div class="form-group"><label>Receipt Prefix</label><input id="s_recPref"></div>
<div class="form-group"><label>Next Receipt #</label><input id="s_recNext" type="number" min="1"></div>
</div>

<h3>Defaults</h3>
<div class="form-group"><label>Invoice Notes</label><textarea id="s_invNotes" rows="2"></textarea></div>
<div class="form-group"><label>Invoice Terms</label><textarea id="s_invTerms" rows="2"></textarea></div>
<div class="form-group"><label>Invoice Footer</label><textarea id="s_invFooter" rows="2"></textarea></div>
<div class="form-group"><label>Receipt Purpose</label><input id="s_recBeing"></div>

<div class="btn-row" style="margin-top:16px">
<button class="btn btn-green" onclick="saveCompany()">Save Settings</button>
</div>
<div id="settingsStatus" class="status-bar"></div>
</div>
</div>

<!-- ===== INVOICE ===== -->
<div id="invoicePanel" class="tab-panel">
<div class="card">
<h2>Invoice Generator</h2>
<div class="form-row">
<div class="form-group"><label>Invoice No.</label><input id="invNo" readonly style="background:#f5f5f5;font-weight:700"></div>
<div class="form-group"><label>Date</label><input id="invDate" type="date"></div>
</div>
<div class="form-group"><label>Customer Name</label><input id="custName"></div>
<div class="form-row">
<div class="form-group"><label>Address</label><input id="custAddr"></div>
<div class="form-group"><label>Phone</label><input id="custPhone" type="tel"></div>
</div>
<div class="form-row">
<div class="form-group"><label>C.R.</label><input id="custCr"></div>
<div class="form-group"><label>Email</label><input id="custEmail" type="email"></div>
</div>
<div class="table-wrap">
<table><thead><tr><th>#</th><th>Description</th><th style="width:65px">Qty</th><th style="width:100px">Price</th><th style="width:100px">Amount</th></tr></thead>
<tbody id="invItems"></tbody></table>
</div>
<div class="btn-row">
<button class="btn btn-green btn-sm" onclick="addInvRow()">+ Add Row</button>
<button class="btn btn-red btn-sm" onclick="removeInvRow()">- Remove</button>
</div>
<div class="form-row">
<div class="form-group"><label>Subtotal</label><input id="invSubtotal" readonly style="background:#f5f5f5;font-weight:700"></div>
<div class="form-group" style="max-width:100px"><label>VAT %</label><input id="invVatPct" type="number" oninput="calcInv()"></div>
<div class="form-group"><label>VAT Amount</label><input id="invVatAmt" readonly style="background:#f5f5f5;font-weight:700"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Discount</label><input id="invDiscount" type="number" value="0" step="0.001" oninput="calcInv()"></div>
<div class="form-group"><label>Grand Total</label><input id="invGrand" readonly style="background:#f5f5f5;font-weight:700;font-size:16px;border:2px solid #1a3a2c"></div>
</div>
<div class="form-group"><label>Amount in Words</label><input id="invWords" readonly style="background:#f5f5f5;font-size:11px"></div>
<div class="form-group"><label>Payment</label>
<select id="invPayMethod"><option>Cash</option><option>Cheque</option><option>Bank Transfer</option></select></div>
<div class="form-row">
<div class="form-group cond" id="invChequeField"><label>Cheque No.</label><input id="invChequeNo"></div>
<div class="form-group cond" id="invBankField"><label>Bank</label><input id="invBankName"></div>
</div>
<div class="form-group"><label>Notes</label><textarea id="invNotes" rows="2"></textarea></div>
<div class="btn-row">
<button class="btn btn-blue" onclick="printInvoice()">&#128424; Print / PDF</button>
<button class="btn btn-green" onclick="saveInvoice()">&#128190; Save &amp; Next</button>
</div>
</div>
</div>

<!-- ===== RECEIPT ===== -->
<div id="receiptPanel" class="tab-panel">
<div class="card">
<h2>Receipt Voucher</h2>
<div class="form-row">
<div class="form-group"><label>Receipt No.</label><input id="recNo" readonly style="background:#f5f5f5;font-weight:700"></div>
<div class="form-group"><label>Date</label><input id="recDate" type="date"></div>
</div>
<div class="form-group"><label>Received From</label><input id="recFrom"></div>
<div class="form-row">
<div class="form-group"><label>Amount</label><input id="recAmount" type="number" step="0.001"></div>
<div class="form-group"><label>Words</label><input id="recWords" readonly style="background:#f5f5f5;font-size:11px"></div>
</div>
<div class="form-group"><label>Payment Method</label>
<select id="recPayMethod"><option>Cash</option><option>Cheque</option><option>Bank Transfer</option></select></div>
<div class="form-row">
<div class="form-group cond" id="recChequeField"><label>Cheque No.</label><input id="recChequeNo"></div>
<div class="form-group cond" id="recBankField"><label>Bank</label><input id="recBankName"></div>
<div class="form-group cond" id="recTransDateField"><label>Date</label><input id="recTransDate" type="date"></div>
</div>
<div class="form-group"><label>Being (Purpose)</label><input id="recBeing"></div>
<div class="form-row">
<div class="form-group"><label>Receiver</label><input id="recReceiver"></div>
<div class="form-group"><label>Authorized Signatory</label><input id="recSignatory"></div>
</div>
<div class="btn-row">
<button class="btn btn-blue" onclick="printReceipt()">&#128424; Print / PDF</button>
<button class="btn btn-green" onclick="saveReceipt()">&#128190; Save &amp; Next</button>
</div>
</div>
</div>

</div><!-- /appContent -->

<!-- PRINT AREAS -->
<div class="print-only" id="invoicePrintArea"></div>
<div class="print-only" id="receiptPrintArea"></div>

<!-- SCRIPTS (order matters) -->
<script src="js/db.js"></script>
<script src="js/data.js"></script>
<script src="js/settings.js"></script>
<script src="js/invoice.js"></script>
<script src="js/receipt.js"></script>
<script src="js/main.js"></script>

</body>
</html>
